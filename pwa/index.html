<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0f12" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="Enthalpie — assistant nutrition perso : log 1-tap, jauges, courses." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Enthalpie" />
  <title>Enthalpie</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- En-tête -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__logo" aria-hidden="true">
        <svg viewBox="0 0 512 512" width="26" height="26" role="img" aria-label="Enthalpie">
          <defs>
            <linearGradient id="tb-g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#7aa2f7"/>
              <stop offset="1" stop-color="#59c896"/>
            </linearGradient>
          </defs>
          <g transform="rotate(-90 256 256)">
            <circle cx="256" cy="256" r="150" fill="none" stroke="#232833" stroke-width="34"/>
            <circle cx="256" cy="256" r="150" fill="none" stroke="url(#tb-g)" stroke-width="34"
                    stroke-linecap="round" stroke-dasharray="942.5" stroke-dashoffset="358"/>
          </g>
          <path d="M256 168 C214 214 196 244 196 280 a60 60 0 1 0 120 0 C316 244 298 214 256 168 Z"
                fill="none" stroke="url(#tb-g)" stroke-width="16" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="topbar__title">Enthalpie</span>
    </div>
    <div class="topbar__actions">
      <button id="queue-badge" class="queue-badge" type="button" hidden
              title="Actions en attente de synchronisation — appuie pour réessayer"
              aria-label="Synchroniser les actions en attente">
        <span class="queue-badge__ico" aria-hidden="true">⧗</span>
        <span class="queue-badge__n">0</span>
      </button>
      <button id="btn-scan" class="iconbtn" type="button" title="Scanner un code-barres" aria-label="Scanner">
        <span aria-hidden="true">⎙</span>
      </button>
      <button id="btn-settings" class="iconbtn" type="button" title="Réglages" aria-label="Réglages">
        <span aria-hidden="true">⚙</span>
      </button>
    </div>
  </header>

  <!-- Contenu des écrans -->
  <main id="app" class="screen" aria-live="polite"></main>

  <!-- Bouton flottant « Quoi manger ? » (écran Aujourd'hui) -->
  <button id="btn-quoi-manger" class="fab" type="button" hidden>
    <span class="fab__icon" aria-hidden="true">✦</span>
    <span class="fab__label">Quoi manger&nbsp;?</span>
  </button>

  <!-- Navigation basse -->
  <nav class="tabbar" aria-label="Navigation principale">
    <button class="tab is-active" data-screen="today" type="button">
      <span class="tab__icon" aria-hidden="true">☀</span><span class="tab__label">Aujourd'hui</span>
    </button>
    <button class="tab" data-screen="courses" type="button">
      <span class="tab__icon" aria-hidden="true">🛒</span><span class="tab__label">Courses</span>
    </button>
    <button class="tab" data-screen="cuisine" type="button">
      <span class="tab__icon" aria-hidden="true">🍳</span><span class="tab__label">Cuisine</span>
    </button>
    <button class="tab" data-screen="bilan" type="button">
      <span class="tab__icon" aria-hidden="true">📈</span><span class="tab__label">Bilan</span>
    </button>
  </nav>

  <!-- Conteneur des modales / feuilles -->
  <div id="sheet-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
